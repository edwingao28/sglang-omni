name: PR Test (Examples, v1)

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: pr-test-examples-v1-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  unit-test:
    runs-on: [self-hosted]
    container:
      image: frankleeeee/sglang-omni:dev # we lock to this version to avoid repeated docker pull
      options: --gpus all --shm-size=2g --rm -v /dev/shm
    env:
      VENV_NAME: omni-examples-v1
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: ./.github/actions/omni-pipeline-env
        with:
          pipeline-version: v1

      - name: Restore cache
        run: |
          if [ -d "/github/home/${VENV_NAME}" ] && [ -n "$(ls -A "/github/home/${VENV_NAME}/")" ]; then
            cp -p -r "/github/home/${VENV_NAME}" "./${VENV_NAME}"
          fi

      - name: Remove flashinfer
        run: |
          rm -rf /github/home/.cache/flashinfer

      - name: Install dependencies
        shell: bash
        run: |
          if [ -d "${VENV_NAME}" ] && ! "${VENV_NAME}/bin/python" -c "import torch" 2>/dev/null; then
            echo "Cached venv is corrupted, removing..."
            rm -rf "${VENV_NAME}"
          fi
          if [ ! -d "${VENV_NAME}" ]; then
            uv venv "${VENV_NAME}" -p 3.11
          fi
          source "${VENV_NAME}/bin/activate"
          uv pip install -v -e .

      - name: Kill GPU processes
        shell: bash
        run: |
          bash .github/scripts/delete_gpu_process.sh

      - name: Run test
        timeout-minutes: 30
        shell: bash
        run: |
          source "${VENV_NAME}/bin/activate"
          bash .github/scripts/run_examples.sh
        env:
          HF_ENDPOINT: https://hf-mirror.com

      - name: Save cache
        if: always()
        shell: bash
        run: |
          if "${VENV_NAME}/bin/python" -c "import torch" 2>/dev/null; then
            rm -rf "/github/home/${VENV_NAME}"
            cp -p -r "${VENV_NAME}" /github/home/
          else
            echo "::warning::Skipping cache save — venv appears corrupted (torch not importable)"
          fi
