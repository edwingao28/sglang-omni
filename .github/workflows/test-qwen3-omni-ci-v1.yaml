name: Qwen3-Omni CI (v1)

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: qwen3-omni-ci-v1-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# DAG:
#   docs ──► stage-1-thinker ──► stage-2-tts
#                              ├─► stage-3-mmmu
#                              ├─► stage-4-mmmu-tts-consistency
#                              ├─► stage-5-mmsu
#                              └─► stage-6-mmsu-tts-consistency

jobs:
  docs:
    name: docs (v1)
    runs-on: [self-hosted]
    timeout-minutes: 15
    container:
      image: frankleeeee/sglang-omni:dev
      options: --gpus all --rm -v /dev/shm:/dev/shm
    env:
      VENV_NAME: omni-qwen3-v1
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: ./.github/actions/omni-pipeline-env
        with:
          pipeline-version: v1

      - uses: ./.github/actions/omni-setup
        with:
          venv-name: ${{ env.VENV_NAME }}
          install-deps: "true"

      - name: Run docs tests
        shell: bash
        run: |
          source "${VENV_NAME}/bin/activate"
          pytest tests/docs/qwen3_omni/test_docs_qwen3_omni.py -v -s -x
        env:
          HF_ENDPOINT: https://hf-mirror.com

      - name: Post-stage cleanup
        if: always()
        uses: ./.github/actions/omni-post-stage
        with:
          stage-label: docs (v1)

      - name: Save cache
        if: always()
        shell: bash
        run: |
          if "${VENV_NAME}/bin/python" -c "import torch" 2>/dev/null; then
            rm -rf "/github/home/${VENV_NAME}"
            cp -p -r "${VENV_NAME}" /github/home/
          else
            echo "::warning::Skipping cache save — venv appears corrupted (torch not importable)"
          fi

  stage-1-thinker:
    name: stage 1 - thinker length integration (v1)
    needs: docs
    runs-on: [self-hosted]
    timeout-minutes: 20
    container:
      image: frankleeeee/sglang-omni:dev
      options: --gpus all --rm -v /dev/shm:/dev/shm
    env:
      VENV_NAME: omni-qwen3-v1
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: ./.github/actions/omni-pipeline-env
        with:
          pipeline-version: v1

      - uses: ./.github/actions/omni-setup
        with:
          venv-name: ${{ env.VENV_NAME }}

      - name: Run thinker length integration test
        shell: bash
        run: |
          source "${VENV_NAME}/bin/activate"
          pytest tests/test_model/test_qwen3_omni_thinker_length.py -v -s -x
        env:
          HF_ENDPOINT: https://hf-mirror.com

      - name: Post-stage cleanup
        if: always()
        uses: ./.github/actions/omni-post-stage
        with:
          stage-label: thinker-length (v1)

  stage-2-tts:
    name: stage 2 - TTS speed + WER (v1)
    needs: [docs, stage-1-thinker]
    runs-on: [self-hosted]
    timeout-minutes: 15
    container:
      image: frankleeeee/sglang-omni:dev
      options: --gpus all --rm -v /dev/shm:/dev/shm
    env:
      VENV_NAME: omni-qwen3-v1
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: ./.github/actions/omni-pipeline-env
        with:
          pipeline-version: v1

      - uses: ./.github/actions/omni-setup
        with:
          venv-name: ${{ env.VENV_NAME }}

      - name: Run TTS CI (speed + WER)
        shell: bash
        run: |
          source "${VENV_NAME}/bin/activate"
          pytest tests/test_model/test_qwen3_omni_tts_ci.py -v -s -x
        env:
          HF_ENDPOINT: https://hf-mirror.com
          SGLANG_SEEDTTS_MINI_DIR: /github/home/seedtts-mini

      - name: Post-stage cleanup
        if: always()
        uses: ./.github/actions/omni-post-stage
        with:
          stage-label: TTS (speed + WER, v1)
          artifact-path-globs: |
            */speed_results.json
            */wer_results.json
          artifact-upload-name: qwen3-omni-tts-results-v1
          artifact-upload-path: /tmp/**/*_results.json

  stage-3-mmmu:
    name: stage 3 - MMMU accuracy + speed (v1)
    needs: [docs, stage-1-thinker]
    runs-on: [self-hosted]
    timeout-minutes: 20
    container:
      image: frankleeeee/sglang-omni:dev
      options: --gpus all --rm -v /dev/shm:/dev/shm
    env:
      VENV_NAME: omni-qwen3-v1
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: ./.github/actions/omni-pipeline-env
        with:
          pipeline-version: v1

      - uses: ./.github/actions/omni-setup
        with:
          venv-name: ${{ env.VENV_NAME }}

      - name: Run MMMU CI (accuracy + speed)
        shell: bash
        run: |
          source "${VENV_NAME}/bin/activate"
          pytest tests/test_model/test_qwen3_omni_mmmu_ci.py -v -s -x
        env:
          HF_ENDPOINT: https://hf-mirror.com

      - name: Post-stage cleanup
        if: always()
        uses: ./.github/actions/omni-post-stage
        with:
          stage-label: MMMU (accuracy + speed, v1)
          artifact-path-globs: |
            */mmmu/mmmu_results.json
          artifact-upload-name: qwen3-omni-mmmu-results-v1
          artifact-upload-path: /tmp/**/mmmu_results.json

  stage-4-mmmu-tts-consistency:
    name: stage 4 - MMMU TTS consistency (v1)
    needs: [docs, stage-1-thinker]
    runs-on: [self-hosted]
    timeout-minutes: 15
    container:
      image: frankleeeee/sglang-omni:dev
      options: --gpus all --rm -v /dev/shm:/dev/shm
    env:
      VENV_NAME: omni-qwen3-v1
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: ./.github/actions/omni-pipeline-env
        with:
          pipeline-version: v1

      - uses: ./.github/actions/omni-setup
        with:
          venv-name: ${{ env.VENV_NAME }}

      - name: Run MMMU TTS Consistency CI (WER + speed)
        shell: bash
        run: |
          source "${VENV_NAME}/bin/activate"
          pytest tests/test_model/test_qwen3_omni_mmmu_tts_consistency_ci.py -v -s -x
        env:
          HF_ENDPOINT: https://hf-mirror.com

      - name: Post-stage cleanup
        if: always()
        uses: ./.github/actions/omni-post-stage
        with:
          stage-label: MMMU TTS Consistency (WER + speed, v1)
          artifact-path-globs: |
            */mmmu_audio/mmmu_results.json
          artifact-upload-name: qwen3-omni-mmmu-tts-consistency-results-v1
          artifact-upload-path: /tmp/**/mmmu_audio/mmmu_results.json

  stage-5-mmsu:
    name: stage 5 - MMSU accuracy + speed (v1)
    needs: [docs, stage-1-thinker]
    runs-on: [self-hosted]
    timeout-minutes: 20
    container:
      image: frankleeeee/sglang-omni:dev
      options: --gpus all --rm -v /dev/shm:/dev/shm
    env:
      VENV_NAME: omni-qwen3-v1
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: ./.github/actions/omni-pipeline-env
        with:
          pipeline-version: v1

      - uses: ./.github/actions/omni-setup
        with:
          venv-name: ${{ env.VENV_NAME }}

      - name: Run MMSU CI (accuracy + speed)
        shell: bash
        run: |
          source "${VENV_NAME}/bin/activate"
          pytest tests/test_model/test_qwen3_omni_mmsu_ci.py -v -s -x
        env:
          HF_ENDPOINT: https://hf-mirror.com

      - name: Post-stage cleanup
        if: always()
        uses: ./.github/actions/omni-post-stage
        with:
          stage-label: MMSU (accuracy + speed, summary only, v1)
          artifact-path-globs: |
            */mmsu/mmsu_results.json
          artifact-upload-name: qwen3-omni-mmsu-results-v1
          artifact-upload-path: /tmp/**/mmsu/mmsu_results.json
          summary-only: "true"

  stage-6-mmsu-tts-consistency:
    name: stage 6 - MMSU TTS consistency (v1)
    needs: [docs, stage-1-thinker]
    runs-on: [self-hosted]
    timeout-minutes: 15
    container:
      image: frankleeeee/sglang-omni:dev
      options: --gpus all --rm -v /dev/shm:/dev/shm
    env:
      VENV_NAME: omni-qwen3-v1
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: ./.github/actions/omni-pipeline-env
        with:
          pipeline-version: v1

      - uses: ./.github/actions/omni-setup
        with:
          venv-name: ${{ env.VENV_NAME }}

      - name: Run MMSU TTS Consistency CI (WER + speed)
        shell: bash
        run: |
          source "${VENV_NAME}/bin/activate"
          pytest tests/test_model/test_qwen3_omni_mmsu_tts_consistency_ci.py -v -s -x
        env:
          HF_ENDPOINT: https://hf-mirror.com

      - name: Post-stage cleanup
        if: always()
        uses: ./.github/actions/omni-post-stage
        with:
          stage-label: MMSU TTS Consistency (WER + speed, v1)
          artifact-path-globs: |
            */mmsu_audio/mmsu_results.json
          artifact-upload-name: qwen3-omni-mmsu-tts-consistency-results-v1
          artifact-upload-path: /tmp/**/mmsu_audio/mmsu_results.json
