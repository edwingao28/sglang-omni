name: Qwen3-Omni CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: qwen3-omni-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# DAG:
#   docs ──► stage-1-thinker ──► stage-2-tts
#                              ├─► stage-3-mmmu
#                              ├─► stage-4-mmmu-tts-consistency
#                              ├─► stage-5-mmsu
#                              └─► stage-6-mmsu-tts-consistency

jobs:
  docs:
    name: docs
    runs-on: [self-hosted]
    timeout-minutes: 30
    container:
      image: frankleeeee/sglang-omni:dev
      options: --gpus all --rm -v /dev/shm:/dev/shm
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: ./.github/actions/omni-setup
        with:
          venv-name: omni-qwen3
          install-deps: "true"

      - name: Run docs tests (legacy)
        shell: bash
        run: |
          source omni-qwen3/bin/activate
          pytest tests/docs/qwen3_omni/test_docs_qwen3_omni.py -v -s -x --basetemp "${GITHUB_WORKSPACE}/.pytest-qwen3-docs-legacy"
        env:
          HF_ENDPOINT: https://hf-mirror.com

      - name: Post-stage cleanup (legacy)
        if: always()
        uses: ./.github/actions/omni-post-stage
        with:
          stage-label: docs (legacy)

      - name: Run docs tests (v1)
        shell: bash
        run: |
          source omni-qwen3/bin/activate
          pytest tests/docs/qwen3_omni/test_docs_qwen3_omni.py -v -s -x --basetemp "${GITHUB_WORKSPACE}/.pytest-qwen3-docs-v1"
        env:
          HF_ENDPOINT: https://hf-mirror.com
          SGLANG_OMNI_SERVER_VERSION: v1

      - name: Post-stage cleanup (v1)
        if: always()
        uses: ./.github/actions/omni-post-stage
        with:
          stage-label: docs (v1)

      - name: Save cache
        if: always()
        shell: bash
        run: |
          if omni-qwen3/bin/python -c "import torch" 2>/dev/null; then
            rm -rf /github/home/omni-qwen3
            cp -p -r omni-qwen3 /github/home/
          else
            echo "::warning::Skipping cache save — venv appears corrupted (torch not importable)"
          fi

  stage-1-thinker:
    name: stage 1 - thinker length integration
    needs: docs
    runs-on: [self-hosted]
    timeout-minutes: 40
    container:
      image: frankleeeee/sglang-omni:dev
      options: --gpus all --rm -v /dev/shm:/dev/shm
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: ./.github/actions/omni-setup
        with:
          venv-name: omni-qwen3

      - name: Run thinker length integration test (legacy)
        shell: bash
        run: |
          source omni-qwen3/bin/activate
          pytest tests/test_model/test_qwen3_omni_thinker_length.py -v -s -x --basetemp "${GITHUB_WORKSPACE}/.pytest-qwen3-thinker-legacy"
        env:
          HF_ENDPOINT: https://hf-mirror.com

      - name: Post-stage cleanup (legacy)
        if: always()
        uses: ./.github/actions/omni-post-stage
        with:
          stage-label: thinker-length (legacy)

      - name: Run thinker length integration test (v1)
        shell: bash
        run: |
          source omni-qwen3/bin/activate
          pytest tests/test_model/test_qwen3_omni_thinker_length.py -v -s -x --basetemp "${GITHUB_WORKSPACE}/.pytest-qwen3-thinker-v1"
        env:
          HF_ENDPOINT: https://hf-mirror.com
          SGLANG_OMNI_SERVER_VERSION: v1

      - name: Post-stage cleanup (v1)
        if: always()
        uses: ./.github/actions/omni-post-stage
        with:
          stage-label: thinker-length (v1)

  stage-2-tts:
    name: stage 2 - TTS speed + WER
    needs: [docs, stage-1-thinker]
    runs-on: [self-hosted]
    timeout-minutes: 30
    container:
      image: frankleeeee/sglang-omni:dev
      options: --gpus all --rm -v /dev/shm:/dev/shm
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: ./.github/actions/omni-setup
        with:
          venv-name: omni-qwen3

      - name: Run TTS CI (legacy)
        shell: bash
        run: |
          source omni-qwen3/bin/activate
          pytest tests/test_model/test_qwen3_omni_tts_ci.py -v -s -x --basetemp "${GITHUB_WORKSPACE}/.pytest-qwen3-tts-legacy"
        env:
          HF_ENDPOINT: https://hf-mirror.com
          SGLANG_SEEDTTS_MINI_DIR: /github/home/seedtts-mini

      - name: Post-stage cleanup (legacy)
        if: always()
        uses: ./.github/actions/omni-post-stage
        with:
          stage-label: TTS (speed + WER, legacy)
          artifact-search-root: ${{ github.workspace }}/.pytest-qwen3-tts-legacy
          artifact-path-globs: |
            */speed_results.json
            */wer_results.json
          artifact-upload-name: qwen3-omni-tts-results
          artifact-upload-path: ${{ github.workspace }}/.pytest-qwen3-tts-legacy/**/*_results.json

      - name: Run TTS CI (v1)
        shell: bash
        run: |
          source omni-qwen3/bin/activate
          pytest tests/test_model/test_qwen3_omni_tts_ci.py -v -s -x --basetemp "${GITHUB_WORKSPACE}/.pytest-qwen3-tts-v1"
        env:
          HF_ENDPOINT: https://hf-mirror.com
          SGLANG_SEEDTTS_MINI_DIR: /github/home/seedtts-mini
          SGLANG_OMNI_SERVER_VERSION: v1

      - name: Post-stage cleanup (v1)
        if: always()
        uses: ./.github/actions/omni-post-stage
        with:
          stage-label: TTS (speed + WER, v1)
          artifact-search-root: ${{ github.workspace }}/.pytest-qwen3-tts-v1
          artifact-path-globs: |
            */speed_results.json
            */wer_results.json
          artifact-upload-name: qwen3-omni-tts-results-v1
          artifact-upload-path: ${{ github.workspace }}/.pytest-qwen3-tts-v1/**/*_results.json

  stage-3-mmmu:
    name: stage 3 - MMMU accuracy + speed
    needs: [docs, stage-1-thinker]
    runs-on: [self-hosted]
    timeout-minutes: 40
    container:
      image: frankleeeee/sglang-omni:dev
      options: --gpus all --rm -v /dev/shm:/dev/shm
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: ./.github/actions/omni-setup
        with:
          venv-name: omni-qwen3

      - name: Run MMMU CI (legacy)
        shell: bash
        run: |
          source omni-qwen3/bin/activate
          pytest tests/test_model/test_qwen3_omni_mmmu_ci.py -v -s -x --basetemp "${GITHUB_WORKSPACE}/.pytest-qwen3-mmmu-legacy"
        env:
          HF_ENDPOINT: https://hf-mirror.com

      - name: Post-stage cleanup (legacy)
        if: always()
        uses: ./.github/actions/omni-post-stage
        with:
          stage-label: MMMU (accuracy + speed, legacy)
          artifact-search-root: ${{ github.workspace }}/.pytest-qwen3-mmmu-legacy
          artifact-path-globs: |
            */mmmu/mmmu_results.json
          artifact-upload-name: qwen3-omni-mmmu-results
          artifact-upload-path: ${{ github.workspace }}/.pytest-qwen3-mmmu-legacy/**/mmmu_results.json

      - name: Run MMMU CI (v1)
        shell: bash
        run: |
          source omni-qwen3/bin/activate
          pytest tests/test_model/test_qwen3_omni_mmmu_ci.py -v -s -x --basetemp "${GITHUB_WORKSPACE}/.pytest-qwen3-mmmu-v1"
        env:
          HF_ENDPOINT: https://hf-mirror.com
          SGLANG_OMNI_SERVER_VERSION: v1

      - name: Post-stage cleanup (v1)
        if: always()
        uses: ./.github/actions/omni-post-stage
        with:
          stage-label: MMMU (accuracy + speed, v1)
          artifact-search-root: ${{ github.workspace }}/.pytest-qwen3-mmmu-v1
          artifact-path-globs: |
            */mmmu/mmmu_results.json
          artifact-upload-name: qwen3-omni-mmmu-results-v1
          artifact-upload-path: ${{ github.workspace }}/.pytest-qwen3-mmmu-v1/**/mmmu_results.json

  stage-4-mmmu-tts-consistency:
    name: stage 4 - MMMU TTS consistency
    needs: [docs, stage-1-thinker]
    runs-on: [self-hosted]
    timeout-minutes: 30
    container:
      image: frankleeeee/sglang-omni:dev
      options: --gpus all --rm -v /dev/shm:/dev/shm
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: ./.github/actions/omni-setup
        with:
          venv-name: omni-qwen3

      - name: Run MMMU TTS Consistency CI (legacy)
        shell: bash
        run: |
          source omni-qwen3/bin/activate
          pytest tests/test_model/test_qwen3_omni_mmmu_tts_consistency_ci.py -v -s -x --basetemp "${GITHUB_WORKSPACE}/.pytest-qwen3-mmmu-tts-legacy"
        env:
          HF_ENDPOINT: https://hf-mirror.com

      - name: Post-stage cleanup (legacy)
        if: always()
        uses: ./.github/actions/omni-post-stage
        with:
          stage-label: MMMU TTS Consistency (WER + speed, legacy)
          artifact-search-root: ${{ github.workspace }}/.pytest-qwen3-mmmu-tts-legacy
          artifact-path-globs: |
            */mmmu_audio/mmmu_results.json
          artifact-upload-name: qwen3-omni-mmmu-tts-consistency-results
          artifact-upload-path: ${{ github.workspace }}/.pytest-qwen3-mmmu-tts-legacy/**/mmmu_audio/mmmu_results.json

      - name: Run MMMU TTS Consistency CI (v1)
        shell: bash
        run: |
          source omni-qwen3/bin/activate
          pytest tests/test_model/test_qwen3_omni_mmmu_tts_consistency_ci.py -v -s -x --basetemp "${GITHUB_WORKSPACE}/.pytest-qwen3-mmmu-tts-v1"
        env:
          HF_ENDPOINT: https://hf-mirror.com
          SGLANG_OMNI_SERVER_VERSION: v1

      - name: Post-stage cleanup (v1)
        if: always()
        uses: ./.github/actions/omni-post-stage
        with:
          stage-label: MMMU TTS Consistency (WER + speed, v1)
          artifact-search-root: ${{ github.workspace }}/.pytest-qwen3-mmmu-tts-v1
          artifact-path-globs: |
            */mmmu_audio/mmmu_results.json
          artifact-upload-name: qwen3-omni-mmmu-tts-consistency-results-v1
          artifact-upload-path: ${{ github.workspace }}/.pytest-qwen3-mmmu-tts-v1/**/mmmu_audio/mmmu_results.json

  stage-5-mmsu:
    name: stage 5 - MMSU accuracy + speed
    needs: [docs, stage-1-thinker]
    runs-on: [self-hosted]
    timeout-minutes: 40
    container:
      image: frankleeeee/sglang-omni:dev
      options: --gpus all --rm -v /dev/shm:/dev/shm
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: ./.github/actions/omni-setup
        with:
          venv-name: omni-qwen3

      - name: Run MMSU CI (legacy)
        shell: bash
        run: |
          source omni-qwen3/bin/activate
          pytest tests/test_model/test_qwen3_omni_mmsu_ci.py -v -s -x --basetemp "${GITHUB_WORKSPACE}/.pytest-qwen3-mmsu-legacy"
        env:
          HF_ENDPOINT: https://hf-mirror.com

      - name: Post-stage cleanup (legacy)
        if: always()
        uses: ./.github/actions/omni-post-stage
        with:
          stage-label: MMSU (accuracy + speed, summary only, legacy)
          artifact-search-root: ${{ github.workspace }}/.pytest-qwen3-mmsu-legacy
          artifact-path-globs: |
            */mmsu/mmsu_results.json
          artifact-upload-name: qwen3-omni-mmsu-results
          artifact-upload-path: ${{ github.workspace }}/.pytest-qwen3-mmsu-legacy/**/mmsu/mmsu_results.json
          summary-only: "true"

      - name: Run MMSU CI (v1)
        shell: bash
        run: |
          source omni-qwen3/bin/activate
          pytest tests/test_model/test_qwen3_omni_mmsu_ci.py -v -s -x --basetemp "${GITHUB_WORKSPACE}/.pytest-qwen3-mmsu-v1"
        env:
          HF_ENDPOINT: https://hf-mirror.com
          SGLANG_OMNI_SERVER_VERSION: v1

      - name: Post-stage cleanup (v1)
        if: always()
        uses: ./.github/actions/omni-post-stage
        with:
          stage-label: MMSU (accuracy + speed, summary only, v1)
          artifact-search-root: ${{ github.workspace }}/.pytest-qwen3-mmsu-v1
          artifact-path-globs: |
            */mmsu/mmsu_results.json
          artifact-upload-name: qwen3-omni-mmsu-results-v1
          artifact-upload-path: ${{ github.workspace }}/.pytest-qwen3-mmsu-v1/**/mmsu/mmsu_results.json
          summary-only: "true"

  stage-6-mmsu-tts-consistency:
    name: stage 6 - MMSU TTS consistency
    needs: [docs, stage-1-thinker]
    runs-on: [self-hosted]
    timeout-minutes: 30
    container:
      image: frankleeeee/sglang-omni:dev
      options: --gpus all --rm -v /dev/shm:/dev/shm
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: ./.github/actions/omni-setup
        with:
          venv-name: omni-qwen3

      - name: Run MMSU TTS Consistency CI (legacy)
        shell: bash
        run: |
          source omni-qwen3/bin/activate
          pytest tests/test_model/test_qwen3_omni_mmsu_tts_consistency_ci.py -v -s -x --basetemp "${GITHUB_WORKSPACE}/.pytest-qwen3-mmsu-tts-legacy"
        env:
          HF_ENDPOINT: https://hf-mirror.com

      - name: Post-stage cleanup (legacy)
        if: always()
        uses: ./.github/actions/omni-post-stage
        with:
          stage-label: MMSU TTS Consistency (WER + speed, legacy)
          artifact-search-root: ${{ github.workspace }}/.pytest-qwen3-mmsu-tts-legacy
          artifact-path-globs: |
            */mmsu_audio/mmsu_results.json
          artifact-upload-name: qwen3-omni-mmsu-tts-consistency-results
          artifact-upload-path: ${{ github.workspace }}/.pytest-qwen3-mmsu-tts-legacy/**/mmsu_audio/mmsu_results.json

      - name: Run MMSU TTS Consistency CI (v1)
        shell: bash
        run: |
          source omni-qwen3/bin/activate
          pytest tests/test_model/test_qwen3_omni_mmsu_tts_consistency_ci.py -v -s -x --basetemp "${GITHUB_WORKSPACE}/.pytest-qwen3-mmsu-tts-v1"
        env:
          HF_ENDPOINT: https://hf-mirror.com
          SGLANG_OMNI_SERVER_VERSION: v1

      - name: Post-stage cleanup (v1)
        if: always()
        uses: ./.github/actions/omni-post-stage
        with:
          stage-label: MMSU TTS Consistency (WER + speed, v1)
          artifact-search-root: ${{ github.workspace }}/.pytest-qwen3-mmsu-tts-v1
          artifact-path-globs: |
            */mmsu_audio/mmsu_results.json
          artifact-upload-name: qwen3-omni-mmsu-tts-consistency-results-v1
          artifact-upload-path: ${{ github.workspace }}/.pytest-qwen3-mmsu-tts-v1/**/mmsu_audio/mmsu_results.json
