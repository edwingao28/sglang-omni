name: S2-Pro CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: s2pro-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# DAG:
#   docs ──► stage-1-non-streaming ──┐
#        └─► stage-2-streaming ──────┤
#                                    └──► stage-3-consistency

jobs:
  docs:
    name: docs
    runs-on: [self-hosted]
    timeout-minutes: 20
    container:
      image: frankleeeee/sglang-omni:dev
      options: --gpus all --rm -v /dev/shm:/dev/shm
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: ./.github/actions/omni-setup
        with:
          venv-name: omni-s2pro
          install-deps: "true"

      - name: Run docs tests (legacy)
        shell: bash
        run: |
          source omni-s2pro/bin/activate
          pytest tests/docs/s2pro/test_docs_tts_s2pro.py -v -s -x --basetemp "${GITHUB_WORKSPACE}/.pytest-tmp/s2pro-docs-legacy"
        env:
          HF_ENDPOINT: https://hf-mirror.com

      - name: Post-stage cleanup (legacy)
        if: always()
        uses: ./.github/actions/omni-post-stage
        with:
          stage-label: S2-Pro docs (legacy)

      - name: Run docs tests (v1)
        shell: bash
        run: |
          source omni-s2pro/bin/activate
          pytest tests/docs/s2pro/test_docs_tts_s2pro.py -v -s -x --basetemp "${GITHUB_WORKSPACE}/.pytest-tmp/s2pro-docs-v1"
        env:
          HF_ENDPOINT: https://hf-mirror.com
          SGLANG_OMNI_SERVER_VERSION: v1

      - name: Post-stage cleanup (v1)
        if: always()
        uses: ./.github/actions/omni-post-stage
        with:
          stage-label: S2-Pro docs (v1)

      - name: Save cache
        if: always()
        shell: bash
        run: |
          if omni-s2pro/bin/python -c "import torch" 2>/dev/null; then
            rm -rf /github/home/omni-s2pro
            cp -p -r omni-s2pro /github/home/
          else
            echo "::warning::Skipping cache save — venv appears corrupted (torch not importable)"
          fi

  stage-1-non-streaming:
    name: stage 1 - non-streaming
    needs: docs
    runs-on: [self-hosted]
    timeout-minutes: 10
    container:
      image: frankleeeee/sglang-omni:dev
      options: --gpus all --rm -v /dev/shm:/dev/shm
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: ./.github/actions/omni-setup
        with:
          venv-name: omni-s2pro

      - name: Run benchmark stage (legacy)
        shell: bash
        run: |
          source omni-s2pro/bin/activate
          pytest tests/test_model/test_s2pro_tts_ci.py -v -s -x --concurrency 8 --s2pro-stage s2pro-stage-1-nonstream --basetemp "${GITHUB_WORKSPACE}/.pytest-tmp/s2pro-stage1-legacy"
        env:
          HF_ENDPOINT: https://hf-mirror.com
          SGLANG_SEEDTTS50_DIR: /github/home/seedtts-50
          S2PRO_STAGE_OUTPUT_ROOT: ${{ github.workspace }}/stage-results/legacy/nonstream

      - name: Post-stage cleanup (legacy)
        if: always()
        uses: ./.github/actions/omni-post-stage
        with:
          stage-label: S2-Pro stage 1 (non-streaming, legacy)
          artifact-search-root: stage-results/legacy/nonstream
          artifact-path-globs: |
            */speed_results.json
            */wer_results.json
          artifact-upload-name: s2pro-stage-1-results
          artifact-upload-path: stage-results/legacy/nonstream
          artifact-if-no-files-found: error

      - name: Run benchmark stage (v1)
        shell: bash
        run: |
          source omni-s2pro/bin/activate
          pytest tests/test_model/test_s2pro_tts_ci.py -v -s -x --concurrency 8 --s2pro-stage s2pro-stage-1-nonstream --basetemp "${GITHUB_WORKSPACE}/.pytest-tmp/s2pro-stage1-v1"
        env:
          HF_ENDPOINT: https://hf-mirror.com
          SGLANG_SEEDTTS50_DIR: /github/home/seedtts-50
          S2PRO_STAGE_OUTPUT_ROOT: ${{ github.workspace }}/stage-results/v1/nonstream
          SGLANG_OMNI_SERVER_VERSION: v1

      - name: Post-stage cleanup (v1)
        if: always()
        uses: ./.github/actions/omni-post-stage
        with:
          stage-label: S2-Pro stage 1 (non-streaming, v1)
          artifact-search-root: stage-results/v1/nonstream
          artifact-path-globs: |
            */speed_results.json
            */wer_results.json
          artifact-upload-name: s2pro-stage-1-results-v1
          artifact-upload-path: stage-results/v1/nonstream
          artifact-if-no-files-found: error

  stage-2-streaming:
    name: stage 2 - streaming
    needs: docs
    runs-on: [self-hosted]
    timeout-minutes: 10
    container:
      image: frankleeeee/sglang-omni:dev
      options: --gpus all --rm -v /dev/shm:/dev/shm
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: ./.github/actions/omni-setup
        with:
          venv-name: omni-s2pro

      - name: Run benchmark stage (legacy)
        shell: bash
        run: |
          source omni-s2pro/bin/activate
          pytest tests/test_model/test_s2pro_tts_ci.py -v -s -x --concurrency 8 --s2pro-stage s2pro-stage-2-stream --basetemp "${GITHUB_WORKSPACE}/.pytest-tmp/s2pro-stage2-legacy"
        env:
          HF_ENDPOINT: https://hf-mirror.com
          SGLANG_SEEDTTS50_DIR: /github/home/seedtts-50
          S2PRO_STAGE_OUTPUT_ROOT: ${{ github.workspace }}/stage-results/legacy/stream

      - name: Post-stage cleanup (legacy)
        if: always()
        uses: ./.github/actions/omni-post-stage
        with:
          stage-label: S2-Pro stage 2 (streaming, legacy)
          artifact-search-root: stage-results/legacy/stream
          artifact-path-globs: |
            */speed_results.json
            */wer_results.json
          artifact-upload-name: s2pro-stage-2-results
          artifact-upload-path: stage-results/legacy/stream
          artifact-if-no-files-found: error

      - name: Run benchmark stage (v1)
        shell: bash
        run: |
          source omni-s2pro/bin/activate
          pytest tests/test_model/test_s2pro_tts_ci.py -v -s -x --concurrency 8 --s2pro-stage s2pro-stage-2-stream --basetemp "${GITHUB_WORKSPACE}/.pytest-tmp/s2pro-stage2-v1"
        env:
          HF_ENDPOINT: https://hf-mirror.com
          SGLANG_SEEDTTS50_DIR: /github/home/seedtts-50
          S2PRO_STAGE_OUTPUT_ROOT: ${{ github.workspace }}/stage-results/v1/stream
          SGLANG_OMNI_SERVER_VERSION: v1

      - name: Post-stage cleanup (v1)
        if: always()
        uses: ./.github/actions/omni-post-stage
        with:
          stage-label: S2-Pro stage 2 (streaming, v1)
          artifact-search-root: stage-results/v1/stream
          artifact-path-globs: |
            */speed_results.json
            */wer_results.json
          artifact-upload-name: s2pro-stage-2-results-v1
          artifact-upload-path: stage-results/v1/stream
          artifact-if-no-files-found: error

  stage-3-consistency:
    name: stage 3 - consistency
    needs: [stage-1-non-streaming, stage-2-streaming]
    runs-on: [self-hosted]
    timeout-minutes: 10
    container:
      image: frankleeeee/sglang-omni:dev
      options: --gpus all --rm -v /dev/shm:/dev/shm
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: ./.github/actions/omni-setup
        with:
          venv-name: omni-s2pro

      - name: Download stage 1 artifact (legacy)
        uses: actions/download-artifact@v4
        with:
          name: s2pro-stage-1-results
          path: stage-artifacts/legacy/nonstream

      - name: Download stage 2 artifact (legacy)
        uses: actions/download-artifact@v4
        with:
          name: s2pro-stage-2-results
          path: stage-artifacts/legacy/stream

      - name: Download stage 1 artifact (v1)
        uses: actions/download-artifact@v4
        with:
          name: s2pro-stage-1-results-v1
          path: stage-artifacts/v1/nonstream

      - name: Download stage 2 artifact (v1)
        uses: actions/download-artifact@v4
        with:
          name: s2pro-stage-2-results-v1
          path: stage-artifacts/v1/stream

      - name: Run benchmark stage (legacy)
        shell: bash
        run: |
          source omni-s2pro/bin/activate
          pytest tests/test_model/test_s2pro_tts_ci.py -v -s -x --concurrency 8 --s2pro-stage s2pro-stage-3-consistency --basetemp "${GITHUB_WORKSPACE}/.pytest-tmp/s2pro-stage3-legacy"
        env:
          HF_ENDPOINT: https://hf-mirror.com
          SGLANG_SEEDTTS50_DIR: /github/home/seedtts-50
          S2PRO_STAGE1_SPEED_RESULTS_DIR: ${{ github.workspace }}/stage-artifacts/legacy/nonstream
          S2PRO_STAGE2_SPEED_RESULTS_DIR: ${{ github.workspace }}/stage-artifacts/legacy/stream

      - name: Post-stage cleanup (legacy)
        if: always()
        uses: ./.github/actions/omni-post-stage
        with:
          stage-label: S2-Pro stage 3 (consistency inputs, legacy)
          artifact-search-root: stage-artifacts/legacy
          artifact-path-globs: |
            */speed_results.json
            */wer_results.json

      - name: Run benchmark stage (v1)
        shell: bash
        run: |
          source omni-s2pro/bin/activate
          pytest tests/test_model/test_s2pro_tts_ci.py -v -s -x --concurrency 8 --s2pro-stage s2pro-stage-3-consistency --basetemp "${GITHUB_WORKSPACE}/.pytest-tmp/s2pro-stage3-v1"
        env:
          HF_ENDPOINT: https://hf-mirror.com
          SGLANG_SEEDTTS50_DIR: /github/home/seedtts-50
          S2PRO_STAGE1_SPEED_RESULTS_DIR: ${{ github.workspace }}/stage-artifacts/v1/nonstream
          S2PRO_STAGE2_SPEED_RESULTS_DIR: ${{ github.workspace }}/stage-artifacts/v1/stream
          SGLANG_OMNI_SERVER_VERSION: v1

      - name: Post-stage cleanup (v1)
        if: always()
        uses: ./.github/actions/omni-post-stage
        with:
          stage-label: S2-Pro stage 3 (consistency inputs, v1)
          artifact-search-root: stage-artifacts/v1
          artifact-path-globs: |
            */speed_results.json
            */wer_results.json
