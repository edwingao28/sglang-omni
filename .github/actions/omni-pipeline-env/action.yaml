name: Omni Pipeline Env
description: Configure import resolution for legacy or v1 Omni pipeline tests.

inputs:
  pipeline-version:
    description: Which pipeline implementation the CI job should exercise.
    required: true

runs:
  using: composite
  steps:
    - name: Configure pipeline import path
      shell: bash
      env:
        PIPELINE_VERSION: ${{ inputs.pipeline-version }}
      run: |
        case "${PIPELINE_VERSION}" in
          legacy)
            resolved_pythonpath="${GITHUB_WORKSPACE}${PYTHONPATH:+:${PYTHONPATH}}"
            ;;
          v1)
            alias_root="${GITHUB_WORKSPACE}/.github/.ci-pythonpath/v1"
            mkdir -p "${alias_root}"
            rm -rf "${alias_root}/sglang_omni"
            ln -s "${GITHUB_WORKSPACE}/sglang_omni_v1" "${alias_root}/sglang_omni"
            resolved_pythonpath="${alias_root}:${GITHUB_WORKSPACE}${PYTHONPATH:+:${PYTHONPATH}}"
            ;;
          *)
            echo "::error::Unsupported pipeline version: ${PIPELINE_VERSION}"
            exit 1
            ;;
        esac

        echo "SGLANG_OMNI_CI_PIPELINE_VERSION=${PIPELINE_VERSION}" >> "${GITHUB_ENV}"
        echo "PYTHONPATH=${resolved_pythonpath}" >> "${GITHUB_ENV}"
